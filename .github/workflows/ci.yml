name: CI

on:
  push:
    branches: [master]
  # ─────────────────────────────────────────────────────────────────────
  # Pull-request gating is disabled by default because this repository has
  # a single maintainer and PRs to self add no review value. Re-enable the
  # block below if external contributors join and need their PRs gated by
  # CI before merge:
  #
  # pull_request:
  #   branches: [master]
  # ─────────────────────────────────────────────────────────────────────

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20.x", "22.x"]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
